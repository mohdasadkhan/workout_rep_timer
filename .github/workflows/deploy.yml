name: Build & Deploy to Play Store

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4                  # ✅ updated from v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4                # ✅ updated from v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2           # ✅ needed for Flutter projects!
        with:
          flutter-version: '3.24.0'               # change to your Flutter version

      - name: Cache Gradle
        uses: actions/cache@v4                     # ✅ updated from v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/fitflow.keystore

      - name: Build Release AAB
        run: flutter build appbundle --release
        env:
          KEYSTORE_PATH: fitflow.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: com.asadcoder.fitness.fitflow
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
