name: fitflow
description: "FitFlow helps you crush fitness goals with an intuitive Tabata timer, complete rep tracking, workout history, personal records, and customizable reminders."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+5

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  shared_preferences: ^2.5.5
  just_audio: ^0.10.5
  get_it: ^9.2.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.1.0
  dartz: ^0.10.1
  go_router: ^17.1.0
  hive: ^2.2.3
  intl: ^0.20.2
  hive_flutter: ^1.1.0
  flutter_foreground_task: ^9.2.1
  permission_handler: ^12.0.1
  timeline_tile: ^2.0.0
  flutter_staggered_animations: ^1.1.1
  timezone: ^0.10.1
  flutter_native_splash: ^2.4.7
  awesome_snackbar_content: ^0.1.8
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.26.0

  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mockito: ^5.5.0
  build_runner: ^2.7.1

flutter:

  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/sounds/beep_complete.wav
    - assets/sounds/beep_countdown.wav

flutter_native_splash:
  color: "#FFFFFF"           # light mode background
  image: assets/splash_light.png

  # Dark mode splash
  color_dark: "#121212"      # dark mode background  
  image_dark: assets/splash_dark.png

  android_12:
    color: "#FFFFFF"
    image: assets/splash_light.png
    color_dark: "#121212"
    image_dark: assets/splash_dark.png
